name: Deploy to GitHub Pages

on:
  # Runs after CI workflow completes successfully on main branch
  workflow_run:
    workflows: ['CI - Build and Test']
    types:
      - completed
    branches: ['main']

  # Allows manual deployment from Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: Build for GitHub Pages
    runs-on: ubuntu-latest
    # Only run if CI workflow succeeded or if manually triggered
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Automatically inject basePath in your Next.js configuration file and disable
          # server side image optimization (https://nextjs.org/docs/api-reference/next/image#unoptimized).
          static_site_generator: next

      - name: Restore Next.js cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build
        env:
          # Set basePath for GitHub Pages deployment
          # This ensures images and assets work correctly at the subpath
          NEXT_PUBLIC_BASE_PATH: /FFC_Single_Page_Template

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-deploy smoke check
        env:
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
        timeout-minutes: 5
        run: |
          python3 - <<'PY'
          import os, sys, time, socket, urllib.request, urllib.error
          url = os.environ.get("DEPLOY_URL")
          if not url:
              print("DEPLOY_URL not set", file=sys.stderr)
              sys.exit(2)
          total_wait_seconds = 180
          delay_seconds = 5
          timeout_seconds = 10
          deadline = time.monotonic() + total_wait_seconds
          attempt = 0
          last = None
          while True:
              remaining = deadline - time.monotonic()
              if remaining <= 0:
                  print(f"Smoke check failed: {url} (last: {last})", file=sys.stderr)
                  sys.exit(1)
              attempt += 1
              try:
                  req = urllib.request.Request(url, method="GET", headers={"User-Agent": "gh-actions-smoke"})
                  req_timeout = min(timeout_seconds, remaining)
                  with urllib.request.urlopen(req, timeout=req_timeout) as resp:
                      code = resp.getcode()
                  print(f"Attempt {attempt}: HTTP {code}")
                  print("Smoke check passed")
                  sys.exit(0)
              except urllib.error.HTTPError as e:
                  last = f"HTTPError {e.code}"
                  print(f"Attempt {attempt}: HTTPError {e.code}")
                  try:
                      e.close()
                  except Exception:
                      pass
              except (urllib.error.URLError, TimeoutError, socket.timeout) as e:
                  last = str(e)
                  print(f"Attempt {attempt} error: {e}")
              remaining = deadline - time.monotonic()
              if remaining <= 0:
                  print(f"Smoke check failed: {url} (last: {last})", file=sys.stderr)
                  sys.exit(1)
              time.sleep(min(delay_seconds, remaining))
          PY


  notify-failure:
    name: Notify on production deploy failure
    needs: [deploy]
    if: ${{ always() && needs.deploy.result == 'failure' && (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create incident issue
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const isWorkflowRun = context.eventName === "workflow_run";
            const deployRunUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const upstreamRunUrl = isWorkflowRun ? context.payload.workflow_run.html_url : null;
            const sha = isWorkflowRun ? context.payload.workflow_run.head_sha : context.sha;
            const branch = isWorkflowRun
              ? context.payload.workflow_run.head_branch
              : (context.ref && context.ref.startsWith("refs/heads/") ? context.ref.substring("refs/heads/".length) : context.ref);
            const shortSha = (sha || "").substring(0, 7);

            if (!isWorkflowRun && branch !== "main") {
              core.info(`Skipping incident creation for non-main workflow_dispatch ref: ${branch}`);
              return;
            }

            const labels = ["incident", "deployment"];
            for (const name of labels) {
              try {
                await github.rest.issues.createLabel({ owner, repo, name, color: "B60205" });
              } catch (e) {
                if (e && e.status === 422) continue;
                core.warning(`Could not create label "${name}": ${e && e.message ? e.message : e}`);
              }
            }

            const title = `Production deployment failed (${branch} @ ${shortSha})`;
            const bodyLines = [
              `Deploy run: ${deployRunUrl}`,
            ];
            if (upstreamRunUrl) {
              bodyLines.push(`Upstream run: ${upstreamRunUrl}`);
            }
            bodyLines.push(
              "",
              `Ref: ${branch}`,
              `SHA: ${sha}`,
              "",
              "_This issue was automatically created by the deploy workflow._"
            );
            const body = bodyLines.join("\\n");

            let openIssues = [];
            try {
              const resp = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: "open",
                per_page: 100,
              });
              openIssues = (resp.data || []).filter((item) => !item.pull_request);
            } catch (e) {
              core.warning(`Could not list existing issues for dedupe: ${e && e.message ? e.message : e}`);
            }

            const duplicate = openIssues.find((issue) => {
              const issueTitle = issue.title || "";
              const issueBody = issue.body || "";
              return issueTitle === title || issueBody.includes(`Deploy run: ${deployRunUrl}`);
            });

            if (duplicate) {
              core.info(`Incident issue #${duplicate.number} already exists; adding a comment.`);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: duplicate.number,
                body: [
                  "Another deployment failure was detected:",
                  "",
                  body,
                ].join("\\n"),
              });
              return;
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });

            for (const name of labels) {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: created.data.number, labels: [name] });
              } catch (e) {
                core.warning(`Could not apply label "${name}" to incident: ${e && e.message ? e.message : e}`);
              }
            }
